<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff0000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cheatr Tambola" />
<title>Tambola by Cheatr</title>
<style>
:root{--red:#ff0000;--black:#090909;--white:#fff;--soft:rgba(255,255,255,.72);--faint:rgba(255,255,255,.26)}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--red);color:#fff;padding:max(9px,env(safe-area-inset-top)) 11px max(9px,env(safe-area-inset-bottom));position:relative}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.055;background-image:radial-gradient(rgba(255,255,255,.9) .55px,transparent .55px);background-size:5px 5px}.app{height:100%;max-width:1080px;margin:auto;display:grid;grid-template-rows:auto minmax(180px,.42fr) auto minmax(0,1fr);gap:10px;position:relative;z-index:1}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.35)}.brand{display:flex;align-items:center;gap:13px;min-width:0}.brand-logo{display:block;width:clamp(112px,17vw,178px);height:auto;flex:0 0 auto;filter:drop-shadow(0 4px 7px rgba(0,0,0,.14));animation:logoFloat 3s ease-in-out infinite}.title-wrap{min-width:0}.title-wrap h1{margin:0;font-size:clamp(19px,3vw,29px);line-height:.95;text-transform:uppercase;letter-spacing:-.05em}.save-note{margin:4px 0 0;color:var(--soft);font-size:9px;font-weight:650}.reset{border:0;background:transparent;color:#fff;padding:6px 0;font-size:10px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;opacity:.8}.hero{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:22px;padding:2px 0 10px;border-bottom:1px solid rgba(255,255,255,.35);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;width:260px;height:260px;border:1px solid rgba(255,255,255,.12);border-radius:50%;right:80px;top:50%;transform:translateY(-50%);animation:orbit 7s linear infinite}.hero-copy{min-width:0;position:relative;z-index:1}.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--soft);font-weight:800}.current{font-size:clamp(138px,23vw,270px);font-weight:950;line-height:.7;letter-spacing:-.1em;margin-top:10px;color:#fff;transform-origin:left center}.current.reveal{animation:numberReveal .62s cubic-bezier(.18,.9,.2,1.15)}.current.empty{font-size:clamp(42px,8vw,76px);letter-spacing:-.055em;color:rgba(255,255,255,.56)}.meta{display:flex;gap:22px;margin-top:17px}.stat{display:flex;align-items:end;gap:7px}.stat strong{font-size:32px;line-height:.9;color:#fff}.stat span{font-size:9px;font-weight:800;text-transform:uppercase;color:var(--soft)}.call-btn{width:150px;height:150px;border:0;border-radius:50%;background:#fff;color:#111;font-size:17px;line-height:1.05;text-transform:uppercase;padding:18px;cursor:pointer;touch-action:manipulation;box-shadow:0 12px 28px rgba(0,0,0,.22);transition:transform .15s ease,box-shadow .15s ease;position:relative;z-index:2;animation:buttonFloat 2.4s ease-in-out infinite}.call-btn:before,.call-btn:after{content:"";position:absolute;inset:-8px;border:1px solid rgba(255,255,255,.46);border-radius:50%;animation:ring 2.2s ease-out infinite}.call-btn:after{animation-delay:1.1s}.call-btn:active{transform:scale(.92);box-shadow:0 5px 12px rgba(0,0,0,.18)}.call-btn:disabled{background:rgba(255,255,255,.45);color:rgba(0,0,0,.55);box-shadow:none;animation:none}.wins{display:flex;align-items:center;gap:8px;min-width:0}.wins-label{font-size:9px;font-weight:850;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;color:var(--soft)}.win-list{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0}.win-list::-webkit-scrollbar{display:none}.win-chip{flex:0 0 auto;border:1px solid rgba(255,255,255,.45);background:transparent;color:#fff;border-radius:999px;padding:7px 10px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;transition:.18s ease}.win-chip:active{transform:scale(.94)}.win-chip.won{background:#fff;color:var(--red);border-color:#fff;animation:winPop .5s cubic-bezier(.18,.9,.2,1.15)}.tracker{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:7px}.tracker-head{display:flex;align-items:center;justify-content:space-between}.tracker-head h2{font-size:12px;margin:0;text-transform:uppercase;letter-spacing:.06em}.tracker-head span{font-size:9px;font-weight:800;color:var(--soft)}.number-grid{min-height:0;display:grid;grid-template-columns:repeat(10,minmax(0,1fr));grid-template-rows:repeat(9,minmax(0,1fr));gap:3px}.number-slot{min-width:0;min-height:0;border:1px solid rgba(255,255,255,.32);border-radius:7px;background:transparent;display:grid;place-items:center;font-size:clamp(10px,2vh,16px);font-weight:850;color:#fff;transition:background .28s ease,color .28s ease,transform .28s ease,border-color .28s ease}.number-slot.called{background:#111;color:#fff;border-color:#111;animation:tileFlip .42s ease}.number-slot.current{background:#fff;color:var(--red);border-color:#fff;transform:scale(1.1) rotate(-2deg);z-index:1;animation:tileCurrent .65s cubic-bezier(.18,.9,.2,1.15)}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:20}.confetti i{position:absolute;width:7px;height:16px;background:#fff;top:-20px;animation:fall 1.1s ease-in forwards}.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translate(-50%,14px) scale(.96);background:#111;color:#fff;padding:10px 14px;border-radius:999px;font-size:11px;font-weight:800;opacity:0;pointer-events:none;transition:.18s;z-index:30}.toast.show{opacity:1;transform:translate(-50%,0) scale(1)}
@keyframes numberReveal{0%{transform:scale(.35) rotate(-8deg);opacity:0;filter:blur(8px)}55%{transform:scale(1.08) rotate(2deg);opacity:1;filter:blur(0)}100%{transform:scale(1) rotate(0)}}@keyframes tileFlip{0%{transform:rotateY(90deg) scale(.8)}100%{transform:rotateY(0) scale(1)}}@keyframes tileCurrent{0%{transform:scale(.4) rotate(10deg)}60%{transform:scale(1.18) rotate(-4deg)}100%{transform:scale(1.1) rotate(-2deg)}}@keyframes winPop{0%{transform:scale(.6)}60%{transform:scale(1.14)}100%{transform:scale(1)}}@keyframes ring{0%{transform:scale(.85);opacity:.7}100%{transform:scale(1.35);opacity:0}}@keyframes buttonFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-2px) rotate(1deg)}}@keyframes orbit{to{transform:translateY(-50%) rotate(360deg)}}@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.2}}
@media(max-width:650px){body{padding-left:8px;padding-right:8px}.app{grid-template-rows:auto minmax(155px,.4fr) auto minmax(0,1fr);gap:8px}.brand{gap:9px}.brand-logo{width:100px}.title-wrap h1{font-size:17px}.hero{grid-template-columns:minmax(0,1fr) 92px;gap:10px;padding-bottom:8px}.hero:after{width:170px;height:170px;right:32px}.current{font-size:clamp(112px,31vw,176px)}.current.empty{font-size:40px}.call-btn{width:92px;height:92px;font-size:12px;padding:10px}.meta{gap:14px;margin-top:10px}.stat strong{font-size:22px}.wins{gap:6px}.wins-label{font-size:8px}.win-chip{padding:6px 8px;font-size:8px}.number-grid{gap:2px}.number-slot{font-size:clamp(9px,1.8vh,13px);border-radius:5px}}
@media(max-height:650px){.save-note{display:none}.brand-logo{width:86px}.app{grid-template-rows:auto minmax(112px,.34fr) auto minmax(0,1fr);gap:7px}.hero{padding-bottom:6px}.current{font-size:82px}.call-btn{width:70px;height:70px;font-size:10px}.meta{margin-top:6px}.stat strong{font-size:18px}.win-chip{padding:5px 7px}.number-grid{gap:2px}}
@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><img class="brand-logo" src="cheatr-logo.webp" alt="Cheatr" /><div class="title-wrap"><h1>Tambola</h1><p class="save-note" id="saveNote">Progress saves automatically on this device.</p></div></div><button class="reset" id="resetBtn" type="button">Reset</button></header>
<section class="hero"><div class="hero-copy"><div class="eyebrow">Current number</div><div class="current empty" id="currentNumber">Ready?</div><div class="meta"><div class="stat"><strong id="calledCount">0</strong><span>Called</span></div><div class="stat"><strong id="remainingCount">90</strong><span>Remaining</span></div></div></div><button class="call-btn" id="callBtn" type="button">Call next<br>number</button></section>
<section class="wins"><div class="wins-label">Wins</div><div class="win-list" id="winList"></div></section>
<section class="tracker"><div class="tracker-head"><h2>Number tracker</h2><span>1 to 90</span></div><div class="number-grid" id="numberGrid" aria-label="Tambola number tracker"></div></section>
</main><div class="confetti" id="confetti"></div><div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
(function(){'use strict';var STORAGE_KEY='tambola-caller-v3',called=[],current=null,wins={},toastTimer=null;var WIN_TYPES=['Early Five','Top Line','Middle Line','Bottom Line','Corners','Full House 1','Full House 2'];function el(id){return document.getElementById(id)}function load(){try{var raw=localStorage.getItem(STORAGE_KEY)||localStorage.getItem('tambola-caller-v2');if(!raw)return;var data=JSON.parse(raw),seen={};if(Array.isArray(data.called)){data.called.forEach(function(value){var n=Number(value);if(Number.isInteger(n)&&n>=1&&n<=90&&!seen[n]){seen[n]=true;called.push(n)}});current=called.length?called[called.length-1]:null}if(data.wins&&typeof data.wins==='object')wins=data.wins}catch(e){}}function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({called:called,wins:wins}));el('saveNote').textContent='Saved automatically on this device.'}catch(e){el('saveNote').textContent='Local saving is unavailable in this browser.'}}function build(){var grid=el('numberGrid'),frag=document.createDocumentFragment();for(var n=1;n<=90;n++){var slot=document.createElement('div');slot.className='number-slot';slot.id='number-'+n;slot.textContent=n;frag.appendChild(slot)}grid.appendChild(frag);var list=el('winList');WIN_TYPES.forEach(function(name){var b=document.createElement('button');b.type='button';b.className='win-chip';b.dataset.win=name;b.textContent=name;b.addEventListener('click',function(){toggleWin(name)});list.appendChild(b)})}function render(animate){var used={};called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++){var slot=el('number-'+n);slot.className='number-slot'+(used[n]?' called':'')+(current===n?' current':'')}var cur=el('currentNumber');if(current===null){cur.textContent='Ready?';cur.className='current empty'}else{cur.textContent=current;cur.className='current'+(animate?' reveal':'')}el('calledCount').textContent=called.length;el('remainingCount').textContent=90-called.length;var btn=el('callBtn');btn.disabled=called.length>=90;btn.innerHTML=called.length>=90?'All numbers<br>called':'Call next<br>number';document.querySelectorAll('.win-chip').forEach(function(chip){chip.className='win-chip'+(wins[chip.dataset.win]?' won':'')})}function callNext(){if(called.length>=90)return;var used={},remaining=[];called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++)if(!used[n])remaining.push(n);current=remaining[Math.floor(Math.random()*remaining.length)];called.push(current);render(true);save();burst(10);toast('Number '+current+' called')}function toggleWin(name){wins[name]=!wins[name];render(false);save();if(wins[name]){burst(28);toast(name+' claimed!')}else toast(name+' unmarked')}function burst(count){var box=el('confetti');for(var i=0;i<count;i++){var p=document.createElement('i');p.style.left=(10+Math.random()*80)+'%';p.style.animationDelay=(Math.random()*.25)+'s';p.style.transform='rotate('+(Math.random()*180)+'deg)';box.appendChild(p);setTimeout(function(node){if(node&&node.parentNode)node.parentNode.removeChild(node)},1500,p)}}function reset(){if(!confirm('Reset this Tambola game? All numbers and wins will be cleared.'))return;called=[];current=null;wins={};try{localStorage.removeItem(STORAGE_KEY);localStorage.removeItem('tambola-caller-v2')}catch(e){}render(false);toast('Game reset')}function toast(message){var node=el('toast');node.textContent=message;node.className='toast show';clearTimeout(toastTimer);toastTimer=setTimeout(function(){node.className='toast'},1300)}document.addEventListener('DOMContentLoaded',function(){load();build();render(false);el('callBtn').addEventListener('click',callNext);el('resetBtn').addEventListener('click',reset)})})();
</script>
</body></html>
