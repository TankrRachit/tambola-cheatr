<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff4b24" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tambola" />
  <title>Tambola Caller</title>
  <style>
    :root{--bg:#fff7ed;--card:#fff;--ink:#201b18;--muted:#82746b;--accent:#ff4b24;--accent-dark:#db3514;--border:#eaded4;--called:#201b18;--radius:18px}
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);padding:max(10px,env(safe-area-inset-top)) 10px max(10px,env(safe-area-inset-bottom))}button{font:inherit}
    .app{height:100%;max-width:1100px;margin:auto;display:grid;grid-template-rows:auto auto minmax(0,1fr);gap:10px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand h1{margin:0;font-size:clamp(20px,3vw,30px);line-height:1}.save-note{margin:4px 0 0;font-size:11px;color:var(--muted)}.reset{border:1px solid var(--border);background:#fff;color:var(--ink);padding:9px 12px;border-radius:999px;font-weight:750;cursor:pointer;white-space:nowrap}.controls{display:grid;grid-template-columns:minmax(180px,.75fr) minmax(0,1.25fr);gap:10px}.current-card,.info-card,.tracker{background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}.current-card{min-height:128px;padding:12px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px}.label{font-size:11px;font-weight:850;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}.current{font-size:clamp(64px,11vw,108px);font-weight:950;line-height:.82;letter-spacing:-.07em;margin-top:8px}.current.empty{font-size:clamp(28px,5vw,44px);letter-spacing:-.03em;color:#b1a49b}.call-btn{width:132px;height:104px;border:0;border-radius:15px;background:var(--accent);color:#fff;font-weight:900;font-size:18px;line-height:1.05;padding:12px;cursor:pointer;box-shadow:0 8px 18px rgba(255,75,36,.22);touch-action:manipulation}.call-btn:active{transform:scale(.98);background:var(--accent-dark)}.call-btn:disabled{background:#c9beb7;box-shadow:none}.info-card{padding:12px;display:grid;grid-template-rows:auto minmax(0,1fr);gap:10px;min-width:0}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat{background:#fff8f1;border:1px solid var(--border);border-radius:12px;padding:9px 11px;display:flex;align-items:baseline;justify-content:space-between;gap:8px}.stat strong{font-size:24px;line-height:1}.stat span{font-size:11px;color:var(--muted)}.history-row{min-width:0}.history-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.history-head strong{font-size:13px}.history-head span{font-size:10px;color:var(--muted)}.history{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}.history::-webkit-scrollbar{display:none}.history-chip{flex:0 0 34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--called);color:white;font-size:13px;font-weight:900}.history-empty{font-size:12px;color:var(--muted);padding:8px 0}.tracker{padding:10px;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:8px}.tracker-head{display:flex;align-items:center;justify-content:space-between}.tracker-head h2{font-size:15px;margin:0}.tracker-head span{font-size:10px;color:var(--muted)}.number-grid{min-height:0;display:grid;grid-template-columns:repeat(10,minmax(0,1fr));grid-template-rows:repeat(9,minmax(0,1fr));gap:5px}.number-slot{min-width:0;min-height:0;border:1px solid var(--border);border-radius:8px;background:#fff;color:#776b63;display:grid;place-items:center;font-weight:850;font-size:clamp(11px,2.2vh,17px)}.number-slot.called{background:var(--called);border-color:var(--called);color:#fff}.number-slot.current{background:var(--accent);border-color:var(--accent);color:white;outline:3px solid rgba(255,75,36,.18)}.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translate(-50%,16px);background:var(--ink);color:white;padding:10px 14px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.18s ease;z-index:10}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:650px){body{padding-left:8px;padding-right:8px}.app{gap:8px}.controls{grid-template-columns:1fr 1fr;gap:8px}.current-card{min-height:112px;padding:10px;grid-template-columns:1fr 98px}.call-btn{width:98px;height:92px;font-size:15px}.info-card{padding:9px;gap:7px}.stats{gap:5px}.stat{display:block;padding:7px 8px}.stat strong{font-size:20px;display:block}.stat span{font-size:9px}.history-chip{flex-basis:29px;height:29px;border-radius:7px;font-size:12px}.number-grid{gap:3px}.number-slot{border-radius:6px;font-size:clamp(10px,1.9vh,14px)}.tracker{padding:8px;gap:6px}}
    @media(max-height:650px){.save-note{display:none}.current-card{min-height:92px}.call-btn{height:76px}.current{font-size:58px}.number-grid{gap:3px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"><div class="brand"><h1>Tambola Caller</h1><p class="save-note" id="saveNote">Progress saves automatically on this device.</p></div><button class="reset" id="resetBtn" type="button">Reset game</button></header>
    <section class="controls">
      <div class="current-card"><div><div class="label">Current number</div><div class="current empty" id="currentNumber">Ready?</div></div><button class="call-btn" id="callBtn" type="button">Call next<br>number</button></div>
      <div class="info-card"><div class="stats"><div class="stat"><strong id="calledCount">0</strong><span>Called</span></div><div class="stat"><strong id="remainingCount">90</strong><span>Remaining</span></div></div><div class="history-row"><div class="history-head"><strong>History</strong><span>Latest first</span></div><div class="history" id="historyList"><span class="history-empty">No numbers called yet.</span></div></div></div>
    </section>
    <section class="tracker"><div class="tracker-head"><h2>Number tracker</h2><span>1–90</span></div><div class="number-grid" id="numberGrid" aria-label="Tambola number tracker"></div></section>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
    (function(){
      'use strict';
      var STORAGE_KEY='tambola-caller-v2',called=[],current=null,toastTimer=null;
      function el(id){return document.getElementById(id)}
      function load(){try{var raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;var data=JSON.parse(raw),seen={};if(Array.isArray(data.called)){data.called.forEach(function(value){var n=Number(value);if(Number.isInteger(n)&&n>=1&&n<=90&&!seen[n]){seen[n]=true;called.push(n)}});current=called.length?called[called.length-1]:null}}catch(e){}}
      function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({called:called}));el('saveNote').textContent='Saved automatically on this device.'}catch(e){el('saveNote').textContent='Local saving is unavailable in this browser.'}}
      function build(){var grid=el('numberGrid'),frag=document.createDocumentFragment();for(var n=1;n<=90;n++){var slot=document.createElement('div');slot.className='number-slot';slot.id='number-'+n;slot.textContent=n;frag.appendChild(slot)}grid.appendChild(frag)}
      function render(){var used={};called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++){var slot=el('number-'+n);slot.className='number-slot'+(used[n]?' called':'')+(current===n?' current':'')}var cur=el('currentNumber');if(current===null){cur.textContent='Ready?';cur.className='current empty'}else{cur.textContent=current;cur.className='current'}el('calledCount').textContent=called.length;el('remainingCount').textContent=90-called.length;var btn=el('callBtn');btn.disabled=called.length>=90;btn.innerHTML=called.length>=90?'All numbers<br>called':'Call next<br>number';var history=el('historyList');history.innerHTML='';if(!called.length){var empty=document.createElement('span');empty.className='history-empty';empty.textContent='No numbers called yet.';history.appendChild(empty)}else{for(var i=called.length-1;i>=0;i--){var chip=document.createElement('div');chip.className='history-chip';chip.textContent=called[i];history.appendChild(chip)}}}
      function callNext(){if(called.length>=90)return;var used={},remaining=[];called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++)if(!used[n])remaining.push(n);current=remaining[Math.floor(Math.random()*remaining.length)];called.push(current);render();save();toast('Number '+current+' called')}
      function reset(){if(!confirm('Reset this Tambola game? All progress will be cleared.'))return;called=[];current=null;try{localStorage.removeItem(STORAGE_KEY)}catch(e){}render();toast('Game reset')}
      function toast(message){var node=el('toast');node.textContent=message;node.className='toast show';clearTimeout(toastTimer);toastTimer=setTimeout(function(){node.className='toast'},1200)}
      document.addEventListener('DOMContentLoaded',function(){load();build();render();el('callBtn').addEventListener('click',callNext);el('resetBtn').addEventListener('click',reset)})
    })();
  </script>
</body>
</html>
