<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff0000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cheatr Tambola" />
<title>Tambola by Cheatr</title>
<style>
:root{--red:#ff0000;--black:#090909;--white:#fff;--soft:rgba(255,255,255,.72)}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--red);color:#fff;padding:max(9px,env(safe-area-inset-top)) 11px max(9px,env(safe-area-inset-bottom));position:relative}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.055;background-image:radial-gradient(rgba(255,255,255,.9) .55px,transparent .55px);background-size:5px 5px}.app{height:100%;max-width:1080px;margin:auto;display:grid;grid-template-rows:auto minmax(230px,.54fr) auto minmax(0,1fr);gap:10px;position:relative;z-index:2}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.35)}.brand{display:flex;align-items:center;gap:12px;min-width:0}.brand-logo{display:block;width:clamp(108px,16vw,170px);height:auto;flex:0 0 auto;filter:drop-shadow(0 4px 7px rgba(0,0,0,.14))}.title-wrap h1{margin:0;font-size:clamp(20px,3vw,30px);line-height:1;text-transform:uppercase;letter-spacing:-.05em}.reset{border:0;background:transparent;color:#fff;padding:6px 0;font-size:10px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;opacity:.84}.hero{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:28px;padding:4px 28px 14px 0;border-bottom:1px solid rgba(255,255,255,.35);position:relative;overflow:hidden;transition:grid-template-columns .45s cubic-bezier(.2,.9,.2,1)}.hero.start{grid-template-columns:1fr;place-items:center;padding-right:0}.hero:before,.hero:after{content:"";position:absolute;border:1px solid rgba(255,255,255,.14);border-radius:50%;right:62px;top:50%;transform:translateY(-50%);pointer-events:none}.hero:before{width:340px;height:340px;animation:orbit 5s linear infinite}.hero:after{width:220px;height:220px;animation:orbitReverse 4s linear infinite}.hero.start:before,.hero.start:after{right:50%;transform:translate(50%,-50%)}.hero-copy{min-width:0;position:relative;z-index:2}.hero.start .hero-copy{display:none}.current{font-size:clamp(180px,30vw,340px);font-weight:950;line-height:.67;letter-spacing:-.105em;color:#fff;transform-origin:left center;filter:drop-shadow(0 14px 22px rgba(0,0,0,.16));will-change:transform,opacity,filter}.current.reveal{animation:numberReveal .95s cubic-bezier(.12,.9,.08,1.2)}.call-btn{width:168px;height:168px;border:0;border-radius:50%;background:#fff;color:#111;font-size:24px;font-weight:950;line-height:1;text-transform:uppercase;padding:18px;cursor:pointer;touch-action:manipulation;box-shadow:0 18px 38px rgba(0,0,0,.27);transition:transform .45s cubic-bezier(.2,.9,.2,1),width .45s ease,height .45s ease,box-shadow .15s ease;position:relative;z-index:3;animation:buttonFloat 2s ease-in-out infinite}.hero.start .call-btn{width:190px;height:190px;font-size:26px}.call-btn:before,.call-btn:after{content:"";position:absolute;inset:-10px;border:2px solid rgba(255,255,255,.55);border-radius:50%;animation:ring 1.8s ease-out infinite}.call-btn:after{animation-delay:.9s}.call-btn:active{transform:scale(.88);box-shadow:0 5px 12px rgba(0,0,0,.2)}.call-btn:disabled{background:rgba(255,255,255,.45);color:rgba(0,0,0,.55);box-shadow:none;animation:none}.wins{display:flex;align-items:center;gap:8px;min-width:0}.wins-label{font-size:9px;font-weight:850;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;color:var(--soft)}.win-list{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0}.win-list::-webkit-scrollbar{display:none}.win-chip{flex:0 0 auto;border:1px solid rgba(255,255,255,.45);background:transparent;color:#fff;border-radius:999px;padding:7px 10px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;transition:.18s ease}.win-chip:active{transform:scale(.94)}.win-chip.won{background:#fff;color:var(--red);border-color:#fff;animation:winPop .65s cubic-bezier(.12,.9,.08,1.2)}.tracker{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:7px}.tracker-head{display:flex;align-items:center;justify-content:space-between}.tracker-head h2{font-size:12px;margin:0;text-transform:uppercase;letter-spacing:.06em}.tracker-count{font-size:12px;font-weight:950;color:#fff;letter-spacing:.04em}.number-grid{min-height:0;display:grid;grid-template-columns:repeat(10,minmax(0,1fr));grid-template-rows:repeat(9,minmax(0,1fr));gap:3px}.number-slot{min-width:0;min-height:0;border:1px solid rgba(255,255,255,.32);border-radius:7px;background:transparent;display:grid;place-items:center;font-size:clamp(10px,2vh,16px);font-weight:850;color:#fff;transition:background .28s ease,color .28s ease,transform .28s ease,border-color .28s ease}.number-slot.called{background:#111;color:#fff;border-color:#111}.number-slot.current{background:#fff;color:var(--red);border-color:#fff;transform:scale(1.14) rotate(var(--tile-rot,-3deg));z-index:1}.number-slot.current.tile-reveal{animation:tileCurrent .85s cubic-bezier(.12,.9,.08,1.2)}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:30}.confetti i{position:absolute;width:9px;height:22px;background:#fff;top:-30px;animation:fall 1.55s cubic-bezier(.15,.75,.3,1) forwards}.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:25}.flash.go{animation:flashBlast .55s ease-out}.shockwave{position:fixed;left:50%;top:44%;width:30px;height:30px;border:5px solid rgba(255,255,255,.95);border-radius:50%;transform:translate(-50%,-50%) scale(.1);opacity:0;pointer-events:none;z-index:24}.shockwave.go{animation:shockwave 1s ease-out}.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translate(-50%,14px) scale(.96);background:#111;color:#fff;padding:10px 14px;border-radius:999px;font-size:11px;font-weight:800;opacity:0;pointer-events:none;transition:.18s;z-index:40}.toast.show{opacity:1;transform:translate(-50%,0) scale(1)}body.shake .app{animation:screenShake .55s ease}@keyframes numberReveal{0%{transform:scale(.08) rotate(var(--start-rot,-22deg));opacity:0;filter:blur(20px)}38%{transform:scale(1.26) rotate(var(--overshoot-rot,7deg));opacity:1;filter:blur(0)}66%{transform:scale(.92) rotate(var(--settle-rot,-3deg))}82%{transform:scale(1.05) rotate(1deg)}100%{transform:scale(1) rotate(0)}}@keyframes tileCurrent{0%{transform:scale(.12) rotate(var(--tile-start,22deg));opacity:0}55%{transform:scale(1.32) rotate(var(--tile-peak,-8deg));opacity:1}100%{transform:scale(1.14) rotate(var(--tile-rot,-3deg))}}@keyframes winPop{0%{transform:scale(.25) rotate(-8deg)}65%{transform:scale(1.22) rotate(3deg)}100%{transform:scale(1)}}@keyframes ring{0%{transform:scale(.72);opacity:.9}100%{transform:scale(1.55);opacity:0}}@keyframes buttonFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.03)}}@keyframes orbit{to{transform:translateY(-50%) rotate(360deg)}}@keyframes orbitReverse{to{transform:translateY(-50%) rotate(-360deg)}}@keyframes fall{0%{transform:translateY(-8vh) rotate(0) scale(1)}100%{transform:translateY(112vh) rotate(900deg) scale(.65);opacity:.15}}@keyframes flashBlast{0%{opacity:0}12%{opacity:.92}34%{opacity:.18}100%{opacity:0}}@keyframes shockwave{0%{transform:translate(-50%,-50%) scale(.1);opacity:1}100%{transform:translate(-50%,-50%) scale(28);opacity:0}}@keyframes screenShake{0%,100%{transform:translate(0)}15%{transform:translate(-7px,3px) rotate(-.4deg)}30%{transform:translate(8px,-4px) rotate(.4deg)}45%{transform:translate(-5px,-2px)}60%{transform:translate(5px,3px)}75%{transform:translate(-2px,1px)}}
@media(max-width:650px){body{padding-left:8px;padding-right:8px}.app{grid-template-rows:auto minmax(205px,.51fr) auto minmax(0,1fr);gap:8px}.brand{gap:9px}.brand-logo{width:96px}.title-wrap h1{font-size:17px}.hero{grid-template-columns:minmax(0,1fr) 105px;gap:10px;padding:0 30px 10px 0}.hero.start{grid-template-columns:1fr;padding-right:0}.hero:before{width:220px;height:220px;right:24px}.hero:after{width:145px;height:145px;right:62px}.hero.start:before,.hero.start:after{right:50%}.current{font-size:clamp(145px,41vw,225px)}.call-btn{width:105px;height:105px;font-size:17px;padding:10px}.hero.start .call-btn{width:132px;height:132px;font-size:20px}.wins{gap:6px}.wins-label{font-size:8px}.win-chip{padding:6px 8px;font-size:8px}.number-grid{gap:2px}.number-slot{font-size:clamp(9px,1.8vh,13px);border-radius:5px}.tracker-count{font-size:11px}}
@media(max-height:650px){.brand-logo{width:82px}.app{grid-template-rows:auto minmax(150px,.42fr) auto minmax(0,1fr);gap:7px}.hero{padding-bottom:6px}.current{font-size:110px}.call-btn{width:80px;height:80px;font-size:13px}.hero.start .call-btn{width:105px;height:105px;font-size:16px}.win-chip{padding:5px 7px}.number-grid{gap:2px}}
@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="app"><header class="topbar"><div class="brand"><img class="brand-logo" src="cheatr-logo.webp" alt="Cheatr" /><div class="title-wrap"><h1>Tambola</h1></div></div><button class="reset" id="resetBtn" type="button">Reset</button></header><section class="hero start" id="hero"><div class="hero-copy"><div class="current" id="currentNumber"></div></div><button class="call-btn" id="callBtn" type="button">Call</button></section><section class="wins"><div class="wins-label">Wins</div><div class="win-list" id="winList"></div></section><section class="tracker"><div class="tracker-head"><h2>Number tracker</h2><span class="tracker-count" id="trackerCount">0/90</span></div><div class="number-grid" id="numberGrid" aria-label="Tambola number tracker"></div></section></main><div class="flash" id="flash"></div><div class="shockwave" id="shockwave"></div><div class="confetti" id="confetti"></div><div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
(function(){'use strict';var STORAGE_KEY='tambola-caller-v3',called=[],current=null,wins={},toastTimer=null;var WIN_TYPES=['Early Five','Top Line','Middle Line','Bottom Line','Corners','Full House 1','Full House 2'];function el(id){return document.getElementById(id)}function load(){try{var raw=localStorage.getItem(STORAGE_KEY)||localStorage.getItem('tambola-caller-v2');if(!raw)return;var data=JSON.parse(raw),seen={};if(Array.isArray(data.called)){data.called.forEach(function(value){var n=Number(value);if(Number.isInteger(n)&&n>=1&&n<=90&&!seen[n]){seen[n]=true;called.push(n)}});current=called.length?called[called.length-1]:null}if(data.wins&&typeof data.wins==='object')wins=data.wins}catch(e){}}function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({called:called,wins:wins}))}catch(e){}}function build(){var grid=el('numberGrid'),frag=document.createDocumentFragment();for(var n=1;n<=90;n++){var slot=document.createElement('div');slot.className='number-slot';slot.id='number-'+n;slot.textContent=n;frag.appendChild(slot)}grid.appendChild(frag);var list=el('winList');WIN_TYPES.forEach(function(name){var b=document.createElement('button');b.type='button';b.className='win-chip';b.dataset.win=name;b.textContent=name;b.addEventListener('click',function(){toggleWin(name)});list.appendChild(b)})}function randomRotation(){var magnitude=16+Math.floor(Math.random()*18);return Math.random()<.5?-magnitude:magnitude}function replayReveal(cur,tile){cur.classList.remove('reveal');tile.classList.remove('tile-reveal');void cur.offsetWidth;void tile.offsetWidth;cur.classList.add('reveal');tile.classList.add('tile-reveal')}function render(animate){var used={};called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++){var slot=el('number-'+n);slot.className='number-slot'+(used[n]?' called':'')+(current===n?' current':'')}var hero=el('hero'),cur=el('currentNumber');if(current===null){hero.className='hero start';cur.textContent='';cur.className='current'}else{hero.className='hero';cur.textContent=current;cur.className='current';if(animate){var start=randomRotation(),overshoot=start>0?-7:7,settle=start>0?3:-3;cur.style.setProperty('--start-rot',start+'deg');cur.style.setProperty('--overshoot-rot',overshoot+'deg');cur.style.setProperty('--settle-rot',settle+'deg');var tile=el('number-'+current);tile.style.setProperty('--tile-start',(-start)+'deg');tile.style.setProperty('--tile-peak',(start>0?-9:9)+'deg');tile.style.setProperty('--tile-rot',(start>0?-3:3)+'deg');replayReveal(cur,tile)}}el('trackerCount').textContent=called.length+'/90';var btn=el('callBtn');btn.disabled=called.length>=90;btn.textContent=called.length>=90?'Done':'Call';document.querySelectorAll('.win-chip').forEach(function(chip){chip.className='win-chip'+(wins[chip.dataset.win]?' won':'')})}function grandBlast(){var flash=el('flash'),shock=el('shockwave');flash.className='flash';shock.className='shockwave';void flash.offsetWidth;flash.className='flash go';shock.className='shockwave go';document.body.classList.remove('shake');void document.body.offsetWidth;document.body.classList.add('shake');setTimeout(function(){document.body.classList.remove('shake')},650)}function callNext(){if(called.length>=90)return;var used={},remaining=[];called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++)if(!used[n])remaining.push(n);current=remaining[Math.floor(Math.random()*remaining.length)];called.push(current);render(true);save();grandBlast();burst(34);toast('Number '+current+' called')}function toggleWin(name){wins[name]=!wins[name];render(false);save();if(wins[name]){grandBlast();burst(70);toast(name+' claimed!')}else toast(name+' unmarked')}function burst(count){var box=el('confetti');for(var i=0;i<count;i++){var p=document.createElement('i');p.style.left=(3+Math.random()*94)+'%';p.style.animationDelay=(Math.random()*.4)+'s';p.style.transform='rotate('+(Math.random()*180)+'deg)';box.appendChild(p);setTimeout(function(node){if(node&&node.parentNode)node.parentNode.removeChild(node)},2200,p)}}function reset(){if(!confirm('Reset this Tambola game? All numbers and wins will be cleared.'))return;called=[];current=null;wins={};try{localStorage.removeItem(STORAGE_KEY);localStorage.removeItem('tambola-caller-v2')}catch(e){}render(false);toast('Game reset')}function toast(message){var node=el('toast');node.textContent=message;node.className='toast show';clearTimeout(toastTimer);toastTimer=setTimeout(function(){node.className='toast'},1400)}document.addEventListener('DOMContentLoaded',function(){load();build();render(false);el('callBtn').addEventListener('click',callNext);el('resetBtn').addEventListener('click',reset)})})();
</script>
</body>
</html>
