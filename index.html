<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff0000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cheatr Tambola" />
<title>Tambola by Cheatr</title>
<style>
:root{--red:#ff0000;--cream:#fff8e8;--ink:#111;--muted:#6f625d;--yellow:#ffe45e;--blue:#a6e4ff;--pink:#ffc2d7}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:Arial Black,Arial,Helvetica,sans-serif;background:var(--cream);color:var(--ink);padding:max(10px,env(safe-area-inset-top)) 12px max(10px,env(safe-area-inset-bottom));background-image:linear-gradient(to bottom,rgba(255,0,0,.035),rgba(255,0,0,0))}button{font:inherit}.app{height:100%;max-width:1100px;margin:auto;display:grid;grid-template-rows:auto auto minmax(0,1fr);gap:12px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:8px;border-bottom:2px solid #111}.brand{display:flex;align-items:center;gap:10px}.logo{background:#111;color:#fff;padding:7px 10px;transform:rotate(-2deg);font-size:15px;letter-spacing:-.04em}.title-wrap h1{margin:0;color:var(--red);font-size:clamp(20px,3vw,30px);line-height:.95;text-transform:uppercase;letter-spacing:-.05em}.save-note{margin:4px 0 0;color:var(--muted);font:700 10px/1.2 Arial,sans-serif}.reset{border:0;background:transparent;color:#111;padding:6px 0;font-size:11px;text-transform:uppercase;text-decoration:underline;text-underline-offset:3px;cursor:pointer}.controls{display:grid;grid-template-columns:minmax(210px,.9fr) minmax(0,1.1fr);gap:18px;align-items:stretch}.current-card{min-height:122px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:14px;padding:6px 0 10px;border-bottom:2px solid #111}.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--red)}.current{font-size:clamp(68px,11vw,112px);font-weight:900;line-height:.8;letter-spacing:-.08em;margin-top:8px}.current.empty{font-size:clamp(27px,5vw,42px);letter-spacing:-.04em;color:#9e8f88}.call-btn{width:138px;height:102px;border:0;border-radius:999px;background:var(--red);color:#fff;font-size:16px;line-height:1;text-transform:uppercase;padding:12px;cursor:pointer;touch-action:manipulation;box-shadow:0 8px 0 #111}.call-btn:active{transform:translateY(4px);box-shadow:0 4px 0 #111}.call-btn:disabled{background:#aaa;box-shadow:none}.info-card{display:grid;grid-template-rows:auto minmax(0,1fr);gap:14px;padding:6px 0 10px;border-bottom:2px solid #111;min-width:0}.stats{display:flex;gap:18px}.stat{display:flex;align-items:end;gap:7px}.stat strong{font-size:30px;line-height:.9}.stat span{font:800 10px Arial,sans-serif;text-transform:uppercase;color:var(--muted)}.stat:first-child strong{color:var(--red)}.history-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}.history-head strong{font-size:12px;text-transform:uppercase}.history-head span{font:700 9px Arial,sans-serif;color:var(--muted)}.history{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}.history::-webkit-scrollbar{display:none}.history-chip{flex:0 0 34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#111;color:#fff;font-size:12px}.history-empty{font:700 11px Arial,sans-serif;padding:7px 0;color:var(--muted)}.tracker{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:8px}.tracker-head{display:flex;align-items:center;justify-content:space-between}.tracker-head h2{font-size:13px;margin:0;text-transform:uppercase}.tracker-head span{font:800 9px Arial,sans-serif;color:var(--muted)}.number-grid{min-height:0;display:grid;grid-template-columns:repeat(10,minmax(0,1fr));grid-template-rows:repeat(9,minmax(0,1fr));gap:3px}.number-slot{min-width:0;min-height:0;border:0;border-radius:5px;background:rgba(17,17,17,.055);display:grid;place-items:center;font-size:clamp(10px,2vh,16px);font-weight:900}.number-slot:nth-child(4n+1){background:rgba(255,228,94,.45)}.number-slot:nth-child(4n+2){background:rgba(166,228,255,.45)}.number-slot:nth-child(4n+3){background:rgba(255,194,215,.45)}.number-slot.called{background:#111!important;color:#fff}.number-slot.current{background:var(--red)!important;color:#fff;outline:3px solid var(--yellow);z-index:1}.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translate(-50%,14px);background:#111;color:#fff;padding:10px 14px;border-radius:999px;font:800 11px Arial,sans-serif;opacity:0;pointer-events:none;transition:.16s;z-index:10}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:650px){body{padding-left:9px;padding-right:9px}.app{gap:9px}.logo{font-size:12px;padding:6px 8px}.title-wrap h1{font-size:18px}.controls{grid-template-columns:1fr 1fr;gap:10px}.current-card{min-height:106px;grid-template-columns:1fr 92px}.call-btn{width:92px;height:88px;font-size:13px;box-shadow:0 6px 0 #111}.stats{gap:12px}.stat strong{font-size:22px}.history-chip{flex-basis:28px;height:28px;font-size:10px}.number-grid{gap:2px}.number-slot{font-size:clamp(9px,1.8vh,13px)}}
@media(max-height:650px){.save-note{display:none}.current-card{min-height:88px}.call-btn{height:72px}.current{font-size:56px}.number-grid{gap:2px}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><div class="logo">CHEATR</div><div class="title-wrap"><h1>Tambola Caller</h1><p class="save-note" id="saveNote">Progress saves automatically on this device.</p></div></div><button class="reset" id="resetBtn" type="button">Reset</button></header>
<section class="controls"><div class="current-card"><div><div class="eyebrow">Number on the loose</div><div class="current empty" id="currentNumber">Ready?</div></div><button class="call-btn" id="callBtn" type="button">Call next<br>number</button></div><div class="info-card"><div class="stats"><div class="stat"><strong id="calledCount">0</strong><span>Called</span></div><div class="stat"><strong id="remainingCount">90</strong><span>Left</span></div></div><div><div class="history-head"><strong>What just happened</strong><span>Latest first</span></div><div class="history" id="historyList"><span class="history-empty">No chaos yet.</span></div></div></div></section>
<section class="tracker"><div class="tracker-head"><h2>The whole gang</h2><span>1 to 90</span></div><div class="number-grid" id="numberGrid" aria-label="Tambola number tracker"></div></section>
</main><div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
(function(){'use strict';var STORAGE_KEY='tambola-caller-v2',called=[],current=null,toastTimer=null;function el(id){return document.getElementById(id)}function load(){try{var raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;var data=JSON.parse(raw),seen={};if(Array.isArray(data.called)){data.called.forEach(function(value){var n=Number(value);if(Number.isInteger(n)&&n>=1&&n<=90&&!seen[n]){seen[n]=true;called.push(n)}});current=called.length?called[called.length-1]:null}}catch(e){}}function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({called:called}));el('saveNote').textContent='Saved on this device. Your chaos is safe.'}catch(e){el('saveNote').textContent='Local saving is unavailable in this browser.'}}function build(){var grid=el('numberGrid'),frag=document.createDocumentFragment();for(var n=1;n<=90;n++){var slot=document.createElement('div');slot.className='number-slot';slot.id='number-'+n;slot.textContent=n;frag.appendChild(slot)}grid.appendChild(frag)}function render(){var used={};called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++){var slot=el('number-'+n);slot.className='number-slot'+(used[n]?' called':'')+(current===n?' current':'')}var cur=el('currentNumber');if(current===null){cur.textContent='Ready?';cur.className='current empty'}else{cur.textContent=current;cur.className='current'}el('calledCount').textContent=called.length;el('remainingCount').textContent=90-called.length;var btn=el('callBtn');btn.disabled=called.length>=90;btn.innerHTML=called.length>=90?'Full<br>house!':'Call next<br>number';var history=el('historyList');history.innerHTML='';if(!called.length){var empty=document.createElement('span');empty.className='history-empty';empty.textContent='No chaos yet.';history.appendChild(empty)}else{for(var i=called.length-1;i>=0;i--){var chip=document.createElement('div');chip.className='history-chip';chip.textContent=called[i];history.appendChild(chip)}}}function callNext(){if(called.length>=90)return;var used={},remaining=[];called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++)if(!used[n])remaining.push(n);current=remaining[Math.floor(Math.random()*remaining.length)];called.push(current);render();save();toast('Number '+current+' has entered the chat')}function reset(){if(!confirm('Reset this Tambola game? All progress will be cleared.'))return;called=[];current=null;try{localStorage.removeItem(STORAGE_KEY)}catch(e){}render();toast('Fresh chaos unlocked')}function toast(message){var node=el('toast');node.textContent=message;node.className='toast show';clearTimeout(toastTimer);toastTimer=setTimeout(function(){node.className='toast'},1300)}document.addEventListener('DOMContentLoaded',function(){load();build();render();el('callBtn').addEventListener('click',callNext);el('resetBtn').addEventListener('click',reset)})})();
</script>
</body></html>
