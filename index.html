<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff0000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cheatr Tambola" />
<title>Tambola by Cheatr</title>
<style>
:root{--red:#ff0000;--cream:#fff8e8;--ink:#111;--white:#fff;--yellow:#ffe45e;--blue:#7fd7ff;--pink:#ffb3cf;--line:#111;--shadow:4px 4px 0 #111}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:Arial Black,Arial,Helvetica,sans-serif;background:var(--red);color:var(--ink);padding:max(8px,env(safe-area-inset-top)) 8px max(8px,env(safe-area-inset-bottom));background-image:radial-gradient(#fff 1.2px,transparent 1.2px);background-size:18px 18px}button{font:inherit}.app{height:100%;max-width:1100px;margin:auto;display:grid;grid-template-rows:auto auto minmax(0,1fr);gap:8px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:10px}.logo{background:#111;color:#fff;border:2px solid #111;padding:7px 10px;transform:rotate(-2deg);box-shadow:3px 3px 0 var(--yellow);font-size:16px;letter-spacing:-.04em}.title-wrap h1{margin:0;color:#fff;font-size:clamp(19px,3vw,30px);line-height:.95;text-transform:uppercase;letter-spacing:-.05em;text-shadow:2px 2px 0 #111}.save-note{margin:4px 0 0;color:#fff;font:700 10px/1.2 Arial,sans-serif}.reset{border:2px solid #111;background:var(--cream);color:#111;padding:8px 12px;border-radius:999px;font-size:11px;text-transform:uppercase;box-shadow:3px 3px 0 #111;cursor:pointer}.reset:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #111}.controls{display:grid;grid-template-columns:minmax(190px,.85fr) minmax(0,1.15fr);gap:8px}.panel{border:2px solid var(--line);box-shadow:var(--shadow)}.current-card{background:var(--yellow);min-height:124px;padding:12px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;position:relative;overflow:hidden}.current-card:after{content:"BOOM!";position:absolute;right:-12px;top:-11px;background:var(--pink);border:2px solid #111;padding:4px 20px;transform:rotate(12deg);font-size:10px}.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.12em}.current{font-size:clamp(64px,11vw,108px);font-weight:900;line-height:.8;letter-spacing:-.08em;margin-top:8px}.current.empty{font-size:clamp(25px,5vw,42px);letter-spacing:-.04em}.call-btn{width:136px;height:102px;border:2px solid #111;background:var(--red);color:#fff;font-size:17px;line-height:1;text-transform:uppercase;padding:10px;cursor:pointer;box-shadow:5px 5px 0 #111;touch-action:manipulation}.call-btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #111}.call-btn:disabled{background:#aaa}.info-card{background:var(--cream);padding:10px;display:grid;grid-template-rows:auto minmax(0,1fr);gap:8px;min-width:0}.stats{display:grid;grid-template-columns:1fr 1fr;gap:7px}.stat{border:2px solid #111;padding:8px 10px;display:flex;align-items:end;justify-content:space-between}.stat:first-child{background:var(--blue)}.stat:last-child{background:var(--pink)}.stat strong{font-size:25px;line-height:.9}.stat span{font:800 10px Arial,sans-serif;text-transform:uppercase}.history-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}.history-head strong{font-size:12px;text-transform:uppercase}.history-head span{font:700 9px Arial,sans-serif}.history{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}.history::-webkit-scrollbar{display:none}.history-chip{flex:0 0 33px;height:33px;border:2px solid #111;display:grid;place-items:center;background:#111;color:#fff;font-size:12px}.history-empty{font:700 11px Arial,sans-serif;padding:7px 0}.tracker{background:var(--cream);padding:8px;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:6px}.tracker-head{display:flex;align-items:center;justify-content:space-between}.tracker-head h2{font-size:13px;margin:0;text-transform:uppercase}.tracker-head span{font:800 9px Arial,sans-serif}.number-grid{min-height:0;display:grid;grid-template-columns:repeat(10,minmax(0,1fr));grid-template-rows:repeat(9,minmax(0,1fr));gap:3px}.number-slot{min-width:0;min-height:0;border:1.5px solid #111;background:#fff;display:grid;place-items:center;font-size:clamp(10px,2vh,16px);font-weight:900}.number-slot:nth-child(4n+1){background:#fff5a8}.number-slot:nth-child(4n+2){background:#d9f3ff}.number-slot:nth-child(4n+3){background:#ffd8e6}.number-slot.called{background:#111!important;color:#fff}.number-slot.current{background:var(--red)!important;color:#fff;outline:3px solid var(--yellow);z-index:1}.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translate(-50%,14px);background:#111;color:#fff;border:2px solid #fff;padding:9px 13px;font:800 11px Arial,sans-serif;opacity:0;pointer-events:none;transition:.16s;z-index:10}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:650px){.app{gap:6px}.logo{font-size:13px;padding:6px 8px}.title-wrap h1{font-size:18px}.controls{grid-template-columns:1fr 1fr;gap:6px}.current-card{min-height:108px;padding:9px;grid-template-columns:1fr 92px}.call-btn{width:92px;height:88px;font-size:13px}.info-card{padding:7px;gap:6px}.stats{gap:4px}.stat{display:block;padding:6px}.stat strong{font-size:20px;display:block}.stat span{font-size:8px}.history-chip{flex-basis:27px;height:27px;font-size:10px}.tracker{padding:6px}.number-grid{gap:2px}.number-slot{font-size:clamp(9px,1.8vh,13px)}}
@media(max-height:650px){.save-note{display:none}.current-card{min-height:90px}.call-btn{height:74px}.current{font-size:56px}.number-grid{gap:2px}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><div class="logo">CHEATR</div><div class="title-wrap"><h1>Tambola Caller</h1><p class="save-note" id="saveNote">Progress saves automatically on this device.</p></div></div><button class="reset" id="resetBtn" type="button">Reset</button></header>
<section class="controls"><div class="current-card panel"><div><div class="eyebrow">Number on the loose</div><div class="current empty" id="currentNumber">Ready?</div></div><button class="call-btn" id="callBtn" type="button">Call next<br>number</button></div><div class="info-card panel"><div class="stats"><div class="stat"><strong id="calledCount">0</strong><span>Called</span></div><div class="stat"><strong id="remainingCount">90</strong><span>Left</span></div></div><div><div class="history-head"><strong>What just happened</strong><span>Latest first</span></div><div class="history" id="historyList"><span class="history-empty">No chaos yet.</span></div></div></div></section>
<section class="tracker panel"><div class="tracker-head"><h2>The whole gang</h2><span>1 to 90</span></div><div class="number-grid" id="numberGrid" aria-label="Tambola number tracker"></div></section>
</main><div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
(function(){'use strict';var STORAGE_KEY='tambola-caller-v2',called=[],current=null,toastTimer=null;function el(id){return document.getElementById(id)}function load(){try{var raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;var data=JSON.parse(raw),seen={};if(Array.isArray(data.called)){data.called.forEach(function(value){var n=Number(value);if(Number.isInteger(n)&&n>=1&&n<=90&&!seen[n]){seen[n]=true;called.push(n)}});current=called.length?called[called.length-1]:null}}catch(e){}}function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({called:called}));el('saveNote').textContent='Saved on this device. Your chaos is safe.'}catch(e){el('saveNote').textContent='Local saving is unavailable in this browser.'}}function build(){var grid=el('numberGrid'),frag=document.createDocumentFragment();for(var n=1;n<=90;n++){var slot=document.createElement('div');slot.className='number-slot';slot.id='number-'+n;slot.textContent=n;frag.appendChild(slot)}grid.appendChild(frag)}function render(){var used={};called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++){var slot=el('number-'+n);slot.className='number-slot'+(used[n]?' called':'')+(current===n?' current':'')}var cur=el('currentNumber');if(current===null){cur.textContent='Ready?';cur.className='current empty'}else{cur.textContent=current;cur.className='current'}el('calledCount').textContent=called.length;el('remainingCount').textContent=90-called.length;var btn=el('callBtn');btn.disabled=called.length>=90;btn.innerHTML=called.length>=90?'Full<br>house!':'Call next<br>number';var history=el('historyList');history.innerHTML='';if(!called.length){var empty=document.createElement('span');empty.className='history-empty';empty.textContent='No chaos yet.';history.appendChild(empty)}else{for(var i=called.length-1;i>=0;i--){var chip=document.createElement('div');chip.className='history-chip';chip.textContent=called[i];history.appendChild(chip)}}}function callNext(){if(called.length>=90)return;var used={},remaining=[];called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++)if(!used[n])remaining.push(n);current=remaining[Math.floor(Math.random()*remaining.length)];called.push(current);render();save();toast('Number '+current+' has entered the chat')}function reset(){if(!confirm('Reset this Tambola game? All progress will be cleared.'))return;called=[];current=null;try{localStorage.removeItem(STORAGE_KEY)}catch(e){}render();toast('Fresh chaos unlocked')}function toast(message){var node=el('toast');node.textContent=message;node.className='toast show';clearTimeout(toastTimer);toastTimer=setTimeout(function(){node.className='toast'},1300)}document.addEventListener('DOMContentLoaded',function(){load();build();render();el('callBtn').addEventListener('click',callNext);el('resetBtn').addEventListener('click',reset)})})();
</script>
</body></html>
