<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff0000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cheatr Tambola" />
<title>Tambola by Cheatr</title>
<style>
:root{--red:#f00;--soft:rgba(255,255,255,.72)}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--red);color:#fff;padding:max(9px,env(safe-area-inset-top)) 10px max(9px,env(safe-area-inset-bottom));position:relative}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.055;background-image:radial-gradient(rgba(255,255,255,.9) .55px,transparent .55px);background-size:5px 5px}.app{height:100%;max-width:1080px;margin:auto;display:grid;grid-template-rows:auto minmax(230px,.54fr) auto minmax(0,1fr);gap:10px;position:relative;z-index:2}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.35)}.brand{display:flex;align-items:center;gap:12px;min-width:0}.brand-logo{display:block;width:clamp(108px,16vw,170px);height:auto}.title-wrap h1{margin:0;font-size:clamp(20px,3vw,30px);line-height:1;text-transform:uppercase;letter-spacing:-.05em}.reset{border:0;background:transparent;color:#fff;padding:6px 0;font-size:10px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;opacity:.84}.hero{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:28px;padding:4px 32px 14px 0;border-bottom:1px solid rgba(255,255,255,.35);position:relative;overflow:hidden}.hero.start{grid-template-columns:1fr;place-items:center;padding-right:0}.hero:before,.hero:after{content:"";position:absolute;border:1px solid rgba(255,255,255,.14);border-radius:50%;right:68px;top:50%;transform:translateY(-50%);pointer-events:none}.hero:before{width:340px;height:340px;animation:orbit 5s linear infinite}.hero:after{width:220px;height:220px;animation:orbitR 4s linear infinite}.hero.start:before,.hero.start:after{right:50%;transform:translate(50%,-50%)}.hero-copy{min-width:0;position:relative;z-index:2}.hero.start .hero-copy{display:none}.current{font-size:clamp(180px,30vw,340px);font-weight:950;line-height:.67;letter-spacing:-.105em;color:#fff;transform-origin:left center;filter:drop-shadow(0 14px 22px rgba(0,0,0,.16));will-change:transform,opacity,filter}.call-btn{width:168px;height:168px;border:0;border-radius:50%;background:#fff;color:#111;font-size:24px;font-weight:950;line-height:1;text-transform:uppercase;padding:18px;cursor:pointer;touch-action:manipulation;box-shadow:0 18px 38px rgba(0,0,0,.27);position:relative;z-index:3;animation:buttonFloat 2s ease-in-out infinite}.hero.start .call-btn{width:190px;height:190px;font-size:26px}.call-btn:before,.call-btn:after{content:"";position:absolute;inset:-10px;border:2px solid rgba(255,255,255,.55);border-radius:50%;animation:ring 1.8s ease-out infinite}.call-btn:after{animation-delay:.9s}.call-btn:active{transform:scale(.88)}.call-btn:disabled{background:rgba(255,255,255,.45);color:rgba(0,0,0,.55);box-shadow:none;animation:none}.wins{display:flex;align-items:center;gap:8px;min-width:0}.wins-label{font-size:9px;font-weight:850;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;color:var(--soft)}.win-list{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0}.win-list::-webkit-scrollbar{display:none}.win-chip{flex:0 0 auto;border:1px solid rgba(255,255,255,.45);background:transparent;color:#fff;border-radius:999px;padding:7px 10px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;cursor:pointer}.win-chip.won{background:#fff;color:var(--red);border-color:#fff}.tracker{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:7px}.tracker-head{display:flex;align-items:center;justify-content:space-between}.tracker-head h2{font-size:12px;margin:0;text-transform:uppercase;letter-spacing:.06em}.tracker-count{font-size:12px;font-weight:950;color:#fff;letter-spacing:.04em}.number-grid{min-height:0;display:grid;grid-template-columns:repeat(10,minmax(0,1fr));grid-template-rows:repeat(9,minmax(0,1fr));gap:3px}.number-slot{min-width:0;min-height:0;border:1px solid rgba(255,255,255,.32);border-radius:7px;background:transparent;display:grid;place-items:center;font-size:clamp(10px,2vh,16px);font-weight:850;color:#fff}.number-slot.called{background:#111;color:#fff;border-color:#111}.number-slot.current{background:#fff;color:var(--red);border-color:#fff;transform:scale(1.14);z-index:1}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:30}.confetti i{position:absolute;width:9px;height:22px;background:#fff;top:-30px;animation:fall 1.55s cubic-bezier(.15,.75,.3,1) forwards}.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:25}.shockwave{position:fixed;left:50%;top:44%;width:30px;height:30px;border:5px solid rgba(255,255,255,.95);border-radius:50%;transform:translate(-50%,-50%) scale(.1);opacity:0;pointer-events:none;z-index:24}.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translate(-50%,14px) scale(.96);background:#111;color:#fff;padding:10px 14px;border-radius:999px;font-size:11px;font-weight:800;opacity:0;pointer-events:none;transition:.18s;z-index:40}.toast.show{opacity:1;transform:translate(-50%,0) scale(1)}@keyframes orbit{to{transform:translateY(-50%) rotate(360deg)}}@keyframes orbitR{to{transform:translateY(-50%) rotate(-360deg)}}@keyframes ring{0%{transform:scale(.72);opacity:.9}100%{transform:scale(1.55);opacity:0}}@keyframes buttonFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.03)}}@keyframes fall{to{transform:translateY(112vh) rotate(900deg) scale(.65);opacity:.15}}@media(max-width:650px){body{padding-left:8px;padding-right:8px}.app{grid-template-rows:auto minmax(205px,.51fr) auto minmax(0,1fr);gap:8px}.brand{gap:9px}.brand-logo{width:96px}.title-wrap h1{font-size:17px}.hero{grid-template-columns:minmax(0,1fr) 105px;gap:10px;padding:0 34px 10px 0}.hero.start{grid-template-columns:1fr;padding-right:0}.hero:before{width:220px;height:220px;right:26px}.hero:after{width:145px;height:145px;right:64px}.hero.start:before,.hero.start:after{right:50%}.current{font-size:clamp(145px,41vw,225px)}.call-btn{width:105px;height:105px;font-size:17px;padding:10px}.hero.start .call-btn{width:132px;height:132px;font-size:20px}.wins{gap:6px}.wins-label{font-size:8px}.win-chip{padding:6px 8px;font-size:8px}.number-grid{gap:2px}.number-slot{font-size:clamp(9px,1.8vh,13px);border-radius:5px}.tracker-count{font-size:11px}}@media(max-height:650px){.brand-logo{width:82px}.app{grid-template-rows:auto minmax(150px,.42fr) auto minmax(0,1fr);gap:7px}.hero{padding-bottom:6px}.current{font-size:110px}.call-btn{width:80px;height:80px;font-size:13px}.hero.start .call-btn{width:105px;height:105px;font-size:16px}.win-chip{padding:5px 7px}.number-grid{gap:2px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<main class="app"><header class="topbar"><div class="brand"><img class="brand-logo" src="cheatr-logo.webp" alt="Cheatr" /><div class="title-wrap"><h1>Tambola</h1></div></div><button class="reset" id="resetBtn" type="button">Reset</button></header><section class="hero start" id="hero"><div class="hero-copy"><div class="current" id="currentNumber"></div></div><button class="call-btn" id="callBtn" type="button">Call</button></section><section class="wins"><div class="wins-label">Wins</div><div class="win-list" id="winList"></div></section><section class="tracker"><div class="tracker-head"><h2>Number tracker</h2><span class="tracker-count" id="trackerCount">0/90</span></div><div class="number-grid" id="numberGrid"></div></section></main><div class="flash" id="flash"></div><div class="shockwave" id="shockwave"></div><div class="confetti" id="confetti"></div><div class="toast" id="toast"></div>
<script>
(function(){'use strict';var KEY='tambola-caller-v3',called=[],current=null,wins={},toastTimer=null,numberAnimation=null,tileAnimation=null;var TYPES=['Early Five','Top Line','Middle Line','Bottom Line','Corners','Full House 1','Full House 2'];function el(id){return document.getElementById(id)}function load(){try{var raw=localStorage.getItem(KEY)||localStorage.getItem('tambola-caller-v2');if(!raw)return;var d=JSON.parse(raw),seen={};(d.called||[]).forEach(function(v){var n=Number(v);if(Number.isInteger(n)&&n>=1&&n<=90&&!seen[n]){seen[n]=1;called.push(n)}});current=called.length?called[called.length-1]:null;if(d.wins&&typeof d.wins==='object')wins=d.wins}catch(e){}}function save(){try{localStorage.setItem(KEY,JSON.stringify({called:called,wins:wins}))}catch(e){}}function build(){var f=document.createDocumentFragment();for(var n=1;n<=90;n++){var s=document.createElement('div');s.className='number-slot';s.id='number-'+n;s.textContent=n;f.appendChild(s)}el('numberGrid').appendChild(f);TYPES.forEach(function(name){var b=document.createElement('button');b.type='button';b.className='win-chip';b.dataset.win=name;b.textContent=name;b.onclick=function(){toggleWin(name)};el('winList').appendChild(b)})}function randomRot(){var m=18+Math.floor(Math.random()*18);return Math.random()<.5?-m:m}function animateNumber(){var cur=el('currentNumber'),tile=el('number-'+current),start=randomRot(),opposite=start>0?-8:8,settle=start>0?3:-3;if(numberAnimation)numberAnimation.cancel();if(tileAnimation)tileAnimation.cancel();cur.getAnimations().forEach(function(a){a.cancel()});tile.getAnimations().forEach(function(a){a.cancel()});numberAnimation=cur.animate([{transform:'scale(.05) rotate('+start+'deg)',opacity:0,filter:'blur(22px)'},{transform:'scale(1.3) rotate('+opposite+'deg)',opacity:1,filter:'blur(0)',offset:.42},{transform:'scale(.9) rotate('+settle+'deg)',offset:.68},{transform:'scale(1.07) rotate(-1deg)',offset:.84},{transform:'scale(1) rotate(0)',opacity:1,filter:'blur(0)'}],{duration:980,easing:'cubic-bezier(.12,.9,.08,1.2)',fill:'both'});tileAnimation=tile.animate([{transform:'scale(.1) rotate('+(-start)+'deg)',opacity:0},{transform:'scale(1.35) rotate('+opposite+'deg)',opacity:1,offset:.58},{transform:'scale(1.14) rotate(0)',opacity:1}],{duration:880,easing:'cubic-bezier(.12,.9,.08,1.2)',fill:'both'})}function render(doAnimate){var used={};called.forEach(function(n){used[n]=1});for(var n=1;n<=90;n++){var s=el('number-'+n);s.className='number-slot'+(used[n]?' called':'')+(current===n?' current':'')}var hero=el('hero'),cur=el('currentNumber');if(current===null){hero.className='hero start';cur.textContent=''}else{hero.className='hero';cur.textContent=current;if(doAnimate)requestAnimationFrame(function(){requestAnimationFrame(animateNumber)})}el('trackerCount').textContent=called.length+'/90';var btn=el('callBtn');btn.disabled=called.length>=90;btn.textContent=called.length>=90?'Done':'Call';document.querySelectorAll('.win-chip').forEach(function(c){c.className='win-chip'+(wins[c.dataset.win]?' won':'')})}function blast(){var flash=el('flash'),shock=el('shockwave');flash.animate([{opacity:0},{opacity:.92,offset:.12},{opacity:.18,offset:.34},{opacity:0}],{duration:550});shock.animate([{transform:'translate(-50%,-50%) scale(.1)',opacity:1},{transform:'translate(-50%,-50%) scale(28)',opacity:0}],{duration:1000,easing:'ease-out'});el('hero').animate([{transform:'translate(0)'},{transform:'translate(-7px,3px) rotate(-.4deg)'},{transform:'translate(8px,-4px) rotate(.4deg)'},{transform:'translate(-5px,-2px)'},{transform:'translate(5px,3px)'},{transform:'translate(0)'}],{duration:550})}function callNext(){if(called.length>=90)return;var used={},left=[];called.forEach(function(n){used[n]=1});for(var n=1;n<=90;n++)if(!used[n])left.push(n);current=left[Math.floor(Math.random()*left.length)];called.push(current);render(true);save();blast();burst(34);toast('Number '+current+' called')}function toggleWin(name){wins[name]=!wins[name];render(false);save();if(wins[name]){blast();burst(70);toast(name+' claimed!')}else toast(name+' unmarked')}function burst(count){var box=el('confetti');for(var i=0;i<count;i++){var p=document.createElement('i');p.style.left=(3+Math.random()*94)+'%';p.style.animationDelay=(Math.random()*.4)+'s';box.appendChild(p);setTimeout(function(node){node.remove()},2200,p)}}function reset(){if(!confirm('Reset this Tambola game? All numbers and wins will be cleared.'))return;if(numberAnimation)numberAnimation.cancel();if(tileAnimation)tileAnimation.cancel();called=[];current=null;wins={};try{localStorage.removeItem(KEY);localStorage.removeItem('tambola-caller-v2')}catch(e){}render(false);toast('Game reset')}function toast(msg){var n=el('toast');n.textContent=msg;n.className='toast show';clearTimeout(toastTimer);toastTimer=setTimeout(function(){n.className='toast'},1400)}document.addEventListener('DOMContentLoaded',function(){load();build();render(false);el('callBtn').onclick=callNext;el('resetBtn').onclick=reset})})();
</script>
</body></html>
