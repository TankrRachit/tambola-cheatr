<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff0000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cheatr Tambola" />
<title>Tambola by Cheatr</title>
<style>
:root{--red:#ff0000;--ink:#0b0b0b;--muted:#666;--line:#e8e8e8;--soft:#f4f4f4;--white:#fff}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--red);color:var(--ink);padding:max(10px,env(safe-area-inset-top)) 12px max(10px,env(safe-area-inset-bottom))}button{font:inherit}.app{height:100%;max-width:1080px;margin:auto;display:grid;grid-template-rows:auto auto minmax(0,1fr);gap:12px;background:#fff;border-radius:24px;padding:14px;box-shadow:0 18px 50px rgba(0,0,0,.18)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding-bottom:10px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:10px}.logo{font-weight:950;font-size:14px;letter-spacing:-.04em}.logo-dot{width:9px;height:9px;background:var(--red);border-radius:50%}.title-wrap h1{margin:0;font-size:clamp(20px,3vw,30px);line-height:.95;text-transform:uppercase;letter-spacing:-.05em}.save-note{margin:4px 0 0;color:var(--muted);font-size:10px;font-weight:650}.reset{border:0;background:transparent;color:#111;padding:6px 0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer}.controls{display:grid;grid-template-columns:minmax(220px,.9fr) minmax(0,1.1fr);gap:22px;align-items:stretch}.current-card{min-height:126px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;padding:4px 0 12px;border-bottom:1px solid var(--line)}.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:800}.current{font-size:clamp(72px,11vw,116px);font-weight:950;line-height:.8;letter-spacing:-.08em;margin-top:8px;color:var(--red);animation:pop .18s ease}.current.empty{font-size:clamp(28px,5vw,42px);letter-spacing:-.04em;color:#b3b3b3}.call-btn{width:116px;height:116px;border:0;border-radius:50%;background:var(--red);color:#fff;font-size:15px;line-height:1.05;text-transform:uppercase;padding:14px;cursor:pointer;touch-action:manipulation;box-shadow:0 10px 24px rgba(255,0,0,.22);transition:transform .15s ease,box-shadow .15s ease}.call-btn:active{transform:scale(.95);box-shadow:0 5px 12px rgba(255,0,0,.15)}.call-btn:disabled{background:#b8b8b8;box-shadow:none}.info-card{display:grid;grid-template-rows:auto minmax(0,1fr);gap:16px;padding:4px 0 12px;border-bottom:1px solid var(--line);min-width:0}.stats{display:flex;gap:26px}.stat{display:flex;align-items:end;gap:8px}.stat strong{font-size:32px;line-height:.9}.stat span{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--muted)}.stat:first-child strong{color:var(--red)}.history-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.history-head strong{font-size:12px;text-transform:uppercase;letter-spacing:.06em}.history-head span{font-size:9px;font-weight:700;color:var(--muted)}.history{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}.history::-webkit-scrollbar{display:none}.history-chip{flex:0 0 34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#111;color:#fff;font-size:12px;font-weight:800;animation:slidein .18s ease}.history-empty{font-size:11px;font-weight:650;padding:7px 0;color:var(--muted)}.tracker{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:8px}.tracker-head{display:flex;align-items:center;justify-content:space-between}.tracker-head h2{font-size:13px;margin:0;text-transform:uppercase;letter-spacing:.06em}.tracker-head span{font-size:9px;font-weight:800;color:var(--muted)}.number-grid{min-height:0;display:grid;grid-template-columns:repeat(10,minmax(0,1fr));grid-template-rows:repeat(9,minmax(0,1fr));gap:3px;background:#fff}.number-slot{min-width:0;min-height:0;border:1px solid var(--line);border-radius:7px;background:#fff;display:grid;place-items:center;font-size:clamp(10px,2vh,16px);font-weight:850;color:#111;transition:background .18s ease,color .18s ease,transform .18s ease}.number-slot.called{background:#111;color:#fff;border-color:#111}.number-slot.current{background:var(--red);color:#fff;border-color:var(--red);transform:scale(1.06);z-index:1}.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translate(-50%,14px);background:#111;color:#fff;padding:10px 14px;border-radius:999px;font-size:11px;font-weight:800;opacity:0;pointer-events:none;transition:.16s;z-index:10}.toast.show{opacity:1;transform:translate(-50%,0)}
@keyframes pop{from{transform:scale(.94);opacity:.5}to{transform:scale(1);opacity:1}}@keyframes slidein{from{transform:translateX(8px);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:650px){body{padding-left:8px;padding-right:8px}.app{gap:10px;padding:11px;border-radius:20px}.title-wrap h1{font-size:18px}.controls{grid-template-columns:1fr 1fr;gap:12px}.current-card{min-height:106px;grid-template-columns:1fr 88px}.call-btn{width:88px;height:88px;font-size:12px}.stats{gap:14px}.stat strong{font-size:23px}.history-chip{flex-basis:28px;height:28px;font-size:10px}.number-grid{gap:2px}.number-slot{font-size:clamp(9px,1.8vh,13px);border-radius:5px}}
@media(max-height:650px){.save-note{display:none}.current-card{min-height:88px}.call-btn{width:72px;height:72px}.current{font-size:56px}.number-grid{gap:2px}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><div class="logo-dot"></div><div><div class="logo">CHEATR</div><div class="title-wrap"><h1>Tambola</h1><p class="save-note" id="saveNote">Progress saves automatically on this device.</p></div></div></div><button class="reset" id="resetBtn" type="button">Reset</button></header>
<section class="controls"><div class="current-card"><div><div class="eyebrow">Current number</div><div class="current empty" id="currentNumber">Ready?</div></div><button class="call-btn" id="callBtn" type="button">Call next<br>number</button></div><div class="info-card"><div class="stats"><div class="stat"><strong id="calledCount">0</strong><span>Called</span></div><div class="stat"><strong id="remainingCount">90</strong><span>Remaining</span></div></div><div><div class="history-head"><strong>History</strong><span>Latest first</span></div><div class="history" id="historyList"><span class="history-empty">No numbers called yet.</span></div></div></div></section>
<section class="tracker"><div class="tracker-head"><h2>Number tracker</h2><span>1 to 90</span></div><div class="number-grid" id="numberGrid" aria-label="Tambola number tracker"></div></section>
</main><div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
(function(){'use strict';var STORAGE_KEY='tambola-caller-v2',called=[],current=null,toastTimer=null;function el(id){return document.getElementById(id)}function load(){try{var raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;var data=JSON.parse(raw),seen={};if(Array.isArray(data.called)){data.called.forEach(function(value){var n=Number(value);if(Number.isInteger(n)&&n>=1&&n<=90&&!seen[n]){seen[n]=true;called.push(n)}});current=called.length?called[called.length-1]:null}}catch(e){}}function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({called:called}));el('saveNote').textContent='Saved automatically on this device.'}catch(e){el('saveNote').textContent='Local saving is unavailable in this browser.'}}function build(){var grid=el('numberGrid'),frag=document.createDocumentFragment();for(var n=1;n<=90;n++){var slot=document.createElement('div');slot.className='number-slot';slot.id='number-'+n;slot.textContent=n;frag.appendChild(slot)}grid.appendChild(frag)}function render(){var used={};called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++){var slot=el('number-'+n);slot.className='number-slot'+(used[n]?' called':'')+(current===n?' current':'')}var cur=el('currentNumber');if(current===null){cur.textContent='Ready?';cur.className='current empty'}else{cur.textContent=current;cur.className='current'}el('calledCount').textContent=called.length;el('remainingCount').textContent=90-called.length;var btn=el('callBtn');btn.disabled=called.length>=90;btn.innerHTML=called.length>=90?'All numbers<br>called':'Call next<br>number';var history=el('historyList');history.innerHTML='';if(!called.length){var empty=document.createElement('span');empty.className='history-empty';empty.textContent='No numbers called yet.';history.appendChild(empty)}else{for(var i=called.length-1;i>=0;i--){var chip=document.createElement('div');chip.className='history-chip';chip.textContent=called[i];history.appendChild(chip)}}}function callNext(){if(called.length>=90)return;var used={},remaining=[];called.forEach(function(n){used[n]=true});for(var n=1;n<=90;n++)if(!used[n])remaining.push(n);current=remaining[Math.floor(Math.random()*remaining.length)];called.push(current);render();save();toast('Number '+current+' called')}function reset(){if(!confirm('Reset this Tambola game? All progress will be cleared.'))return;called=[];current=null;try{localStorage.removeItem(STORAGE_KEY)}catch(e){}render();toast('Game reset')}function toast(message){var node=el('toast');node.textContent=message;node.className='toast show';clearTimeout(toastTimer);toastTimer=setTimeout(function(){node.className='toast'},1200)}document.addEventListener('DOMContentLoaded',function(){load();build();render();el('callBtn').addEventListener('click',callNext);el('resetBtn').addEventListener('click',reset)})})();
</script>
</body></html>
